repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [ --fix ]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run --with pytest pytest
        language: system
        types: [ python ]
        pass_filenames: false
        always_run: true